<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>每日營養需求計算器</title>
  <style>
    /* ── 設計代幣（原版使用 CSS variables，此處具體定義） ── */
    :root {
      --bg:            #f5f5f0;
      --panel-bg:      rgba(255,255,255,0.65);
      --border:        rgba(0,0,0,0.08);
      --text-primary:  #1a1a1a;
      --text-sec:      #6b6b6b;
      --bg-sec:        rgba(0,0,0,0.035);
      --border-ter:    rgba(0,0,0,0.07);
      --radius-lg:     14px;
      --radius-md:     10px;
      --green:         #2e7d32;
      --green-light:   #4caf50;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      font-family: "Noto Sans TC", "Microsoft JhengHei", "細明體", sans-serif;
      color: var(--text-primary);
      font-size: 15px;
      line-height: 1.6;
    }

    /* ── 頁面容器 ── */
    .page {
      max-width: 820px;
      margin: 0 auto;
      padding: 36px 18px 72px;
    }

    header { text-align: center; margin-bottom: 28px; }
    header h1 { font-size: 1.75rem; font-weight: 700; margin: 0 0 6px; }
    header p  { color: var(--text-sec); font-size: .88rem; margin: 0; }

    /* ── Panel ── */
    .panel {
      background: var(--panel-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px 26px;
      margin-bottom: 18px;
    }

    .section-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      margin: 0 0 14px;
    }

    /* ── 表單 ── */
    .grid2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 18px;
    }

    .field label {
      display: block;
      font-size: 13px;
      color: var(--text-sec);
      margin-bottom: 5px;
    }

    .field input,
    .field select {
      width: 100%;
      padding: 8px 11px;
      border: 1px solid rgba(0,0,0,0.15);
      border-radius: 9px;
      background: rgba(255,255,255,0.85);
      font-size: .93rem;
      color: var(--text-primary);
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }

    .field input:focus,
    .field select:focus {
      border-color: var(--green-light);
      box-shadow: 0 0 0 3px rgba(76,175,80,.15);
    }

    /* ── 運動列 ── */
    .divider { border: none; border-top: 1px solid var(--border-ter); margin: 18px 0; }

    .exercise-row {
      display: grid;
      grid-template-columns: 2fr 1fr auto;
      gap: 8px;
      margin-bottom: 10px;
      align-items: end;
    }

    .exercise-row label {
      display: block;
      font-size: 13px;
      color: var(--text-sec);
      margin-bottom: 4px;
    }

    .exercise-row select,
    .exercise-row input[type="number"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid rgba(0,0,0,0.15);
      border-radius: 9px;
      background: rgba(255,255,255,0.85);
      font-size: .9rem;
      outline: none;
      transition: border-color .2s;
    }

    .exercise-row select:focus,
    .exercise-row input:focus { border-color: var(--green-light); }

    .btn-add {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 14px;
      border: 1px solid rgba(76,175,80,.5);
      border-radius: 9px;
      background: rgba(76,175,80,.1);
      color: var(--green);
      font-size: 13px;
      cursor: pointer;
      margin-bottom: 18px;
      transition: background .15s;
    }
    .btn-add:hover { background: rgba(76,175,80,.2); }

    .remove-btn {
      background: none;
      border: none;
      color: var(--text-sec);
      cursor: pointer;
      font-size: 20px;
      padding: 0 4px;
      line-height: 1;
      border-radius: 6px;
      transition: color .15s, background .15s;
      align-self: center;
    }
    .remove-btn:hover { color: #e53935; background: rgba(229,57,53,.08); }

    /* ── 主計算按鈕 ── */
    .btn-calc {
      width: 100%;
      padding: 12px;
      font-size: 1rem;
      font-weight: 700;
      background: var(--green-light);
      color: #fff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 6px;
      transition: background .2s, transform .1s;
    }
    .btn-calc:hover { background: #43a047; transform: translateY(-1px); }

    /* ── 結果 ── */
    .results { display: none; }

    /* TDEE 卡片 */
    .tdee-card {
      background: var(--bg-sec);
      border-radius: var(--radius-lg);
      padding: 16px 20px;
      margin-bottom: 14px;
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
    }
    .tdee-label { font-size: 13px; color: var(--text-sec); }
    .tdee-value { font-size: 2rem; font-weight: 700; color: var(--green); }
    .tdee-unit  { font-size: 14px; color: var(--text-sec); }

    .bmr-note {
      font-size: 12px;
      color: var(--text-sec);
      margin-bottom: 18px;
      padding: 8px 12px;
      background: var(--bg-sec);
      border-radius: 8px;
      font-family: monospace;
      line-height: 1.8;
    }

    /* 巨量卡 */
    .nutrient-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
      margin-bottom: 6px;
    }

    .n-card {
      background: var(--bg-sec);
      border-radius: var(--radius-md);
      padding: 13px 15px;
    }
    .n-label { font-size: 12px; color: var(--text-sec); margin-bottom: 5px; }
    .n-value { font-size: 1.4rem; font-weight: 700; color: var(--text-primary); }
    .n-unit  { font-size: 12px; color: var(--text-sec); margin-left: 2px; }
    .n-kcal  { font-size: 11px; color: var(--text-sec); margin-top: 2px; }

    /* 微量網格 */
    .vit-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .vit-block {
      background: var(--bg-sec);
      border-radius: var(--radius-md);
      padding: 10px 14px;
    }

    .vit-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      border-bottom: 0.5px solid var(--border-ter);
      padding: 7px 0;
    }
    .vit-row:last-child { border-bottom: none; }
    .vit-name { color: var(--text-sec); }
    .vit-val  { font-weight: 600; color: var(--text-primary); }

    /* ── Responsive ── */
    @media (max-width: 560px) {
      .grid2          { grid-template-columns: 1fr; }
      .vit-grid       { grid-template-columns: 1fr; }
      .exercise-row   { grid-template-columns: 1fr auto; }
      .exercise-row > div:first-child { grid-column: 1 / -1; }
    }
  </style>
</head>
<body>
<div class="page">

  <header>
    <h1>每日營養需求計算器</h1>
    <p>基於 Mifflin-St Jeor 公式 · WHO 膳食指南 · ACSM MET 標準 · 純前端，無需伺服器</p>
  </header>

  <!-- ── 輸入表單 ── -->
  <div class="panel">
    <p class="section-title">基本資料</p>
    <div class="grid2">
      <div class="field"><label>體重（kg）</label><input type="number" id="weight" value="65" min="30" max="200" step="0.1"></div>
      <div class="field"><label>身高（cm）</label><input type="number" id="height" value="170" min="100" max="230" step="0.1"></div>
      <div class="field"><label>年齡（歲）</label><input type="number" id="age"    value="30" min="10"  max="100"></div>
      <div class="field"><label>性別</label>
        <select id="sex">
          <option value="male">男性</option>
          <option value="female">女性</option>
        </select>
      </div>
    </div>

    <hr class="divider">
    <p class="section-title">今日運動紀錄（可新增多項）</p>
    <div id="exercise-list"></div>
    <button class="btn-add" onclick="addExercise()">＋ 新增運動</button>

    <button class="btn-calc" onclick="calculate()">計算每日需求</button>
  </div>

  <!-- ── 結果 ── -->
  <div class="results" id="results">

    <!-- 熱量 -->
    <div class="panel">
      <p class="section-title">每日總消耗熱量（TDEE）</p>
      <div class="tdee-card">
        <span class="tdee-label">TDEE</span>
        <span class="tdee-value" id="tdee-val">—</span>
        <span class="tdee-unit">kcal / 天</span>
      </div>
      <div class="bmr-note" id="bmr-note"></div>
    </div>

    <!-- 巨量 -->
    <div class="panel">
      <p class="section-title">巨量營養素建議攝取量</p>
      <div class="nutrient-grid" id="macro-grid"></div>
    </div>

    <!-- 維生素 -->
    <div class="panel">
      <p class="section-title">維生素每日建議攝取量（DRI）</p>
      <div class="vit-grid" id="vit-grid"></div>
    </div>

    <!-- 礦物質 -->
    <div class="panel">
      <p class="section-title">礦物質每日建議攝取量（DRI）</p>
      <div class="vit-grid" id="min-grid"></div>
    </div>

  </div>

</div><!-- /.page -->

<script>
'use strict';

const MET_OPTIONS = [
  { label: '靜坐辦公',       met: 1.5 },
  { label: '站立工作',       met: 2.0 },
  { label: '步行（一般）',   met: 3.5 },
  { label: '快走',           met: 4.5 },
  { label: '騎自行車（輕）', met: 5.0 },
  { label: '重量訓練',       met: 5.0 },
  { label: '瑜伽',           met: 2.5 },
  { label: '有氧舞蹈',       met: 6.5 },
  { label: '慢跑',           met: 7.0 },
  { label: '游泳',           met: 7.0 },
  { label: '騎自行車（中）', met: 8.0 },
  { label: '跑步（快速）',   met: 9.8 },
];

// ── 運動 ──────────────────────────────────────────────────────────────────────
function addExercise() {
  const list = document.getElementById('exercise-list');
  const row  = document.createElement('div');
  row.className = 'exercise-row';
  row.innerHTML = `
    <div>
      <label>運動類型</label>
      <select class="ex-type">
        ${MET_OPTIONS.map(o => `<option value="${o.met}">${o.label}（MET ${o.met}）</option>`).join('')}
      </select>
    </div>
    <div>
      <label>時數（hr）</label>
      <input type="number" class="ex-hours" value="1" min="0.1" max="12" step="0.5">
    </div>
    <button class="remove-btn" onclick="this.closest('.exercise-row').remove()" aria-label="移除">×</button>
  `;
  list.appendChild(row);
}

// ── 計算 ──────────────────────────────────────────────────────────────────────
function calculate() {
  const W   = parseFloat(document.getElementById('weight').value);
  const H   = parseFloat(document.getElementById('height').value);
  const A   = parseFloat(document.getElementById('age').value);
  const sex = document.getElementById('sex').value;

  if (!W || !H || !A || W <= 0 || H <= 0 || A <= 0) {
    alert('請填寫完整且合理的體重、身高、年齡');
    return;
  }

  // BMR — Mifflin-St Jeor
  const BMR = 10 * W + 6.25 * H - 5 * A + (sex === 'male' ? 5 : -161);

  // 運動消耗（用 class 選取，移除後不會殘留舊 ID）
  let E_ex = 0, T_ex = 0;
  document.querySelectorAll('.exercise-row').forEach(row => {
    const met = parseFloat(row.querySelector('.ex-type').value)  || 0;
    const hrs = parseFloat(row.querySelector('.ex-hours').value) || 0;
    E_ex += met * W * hrs;
    T_ex += hrs;
  });
  T_ex = Math.min(T_ex, 16);

  const E_sleep = 0.95 * BMR * (8  / 24);
  const E_rest  =        BMR * (16 - T_ex) / 24;
  const TDEE    = BMR * (23.6 - T_ex) / 24 + E_ex;

  // ── 填入熱量 ──
  document.getElementById('tdee-val').textContent = Math.round(TDEE);
  document.getElementById('bmr-note').innerHTML =
    `BMR = ${Math.round(BMR)} kcal<br>` +
    `睡眠消耗 E_sleep = 0.95 × ${Math.round(BMR)} × (8/24) = ${Math.round(E_sleep)} kcal<br>` +
    `靜態清醒 E_rest  = ${Math.round(BMR)} × (16 − ${T_ex.toFixed(1)}) / 24 = ${Math.round(E_rest)} kcal<br>` +
    `運動消耗 E_ex    = ${Math.round(E_ex)} kcal<br>` +
    `────────────────────────────────────<br>` +
    `TDEE = ${Math.round(E_sleep)} + ${Math.round(E_rest)} + ${Math.round(E_ex)} = <strong>${Math.round(TDEE)} kcal</strong>`;

  // ── 巨量 ──
  const f_prot  = T_ex === 0 ? 0.8 : T_ex <= 1 ? 1.2 : T_ex <= 2 ? 1.5 : 2.0;
  const C_carb  = (0.55 * TDEE) / 4;
  const C_prot  = Math.max((0.15 * TDEE) / 4, W * f_prot);
  const C_fat   = (0.30 * TDEE) / 9;
  const C_fiber = (TDEE / 1000) * 14;

  const macros = [
    { label: '碳水化合物', g: C_carb,  kcal: C_carb  * 4, pct: '55%' },
    { label: '蛋白質',     g: C_prot,  kcal: C_prot  * 4, pct: `≥${Math.round(C_prot * 4 / TDEE * 100)}%` },
    { label: '脂肪',       g: C_fat,   kcal: C_fat   * 9, pct: '30%' },
    { label: '膳食纖維',   g: C_fiber, kcal: null,         pct: '功能性' },
  ];

  document.getElementById('macro-grid').innerHTML = macros.map(m => `
    <div class="n-card">
      <div class="n-label">${m.label}</div>
      <div class="n-value">${Math.round(m.g)}<span class="n-unit">g</span></div>
      ${m.kcal != null
        ? `<div class="n-kcal">${Math.round(m.kcal)} kcal（${m.pct}）</div>`
        : `<div class="n-kcal">${m.pct}</div>`}
    </div>
  `).join('');

  // ── 維生素 DRI ──
  const isMale = sex === 'male';
  const vitamins = [
    { name: '維生素 A',   val: isMale ? '900 μg' : '700 μg' },
    { name: '維生素 C',   val: isMale ? '90 mg'  : '75 mg'  },
    { name: '維生素 D',   val: A >= 70 ? '20 μg' : '15 μg'  },
    { name: '維生素 E',   val: '15 mg α-TE' },
    { name: '維生素 K',   val: isMale ? '120 μg' : '90 μg'  },
    { name: '維生素 B12', val: '2.4 μg' },
    { name: '葉酸（B9）', val: '400 μg DFE' },
    { name: '維生素 B6',  val: A >= 51 ? (isMale ? '1.7 mg' : '1.5 mg') : '1.3 mg' },
    { name: '維生素 B1',  val: isMale ? '1.2 mg' : '1.1 mg' },
    { name: '維生素 B2',  val: isMale ? '1.3 mg' : '1.1 mg' },
    { name: '菸鹼酸（B3）', val: isMale ? '16 mg NE' : '14 mg NE' },
  ];

  const minerals = [
    { name: '鈣',        val: A >= 71 ? '1200 mg' : '1000 mg' },
    { name: '鐵',        val: isMale ? '8 mg' : (A >= 51 ? '8 mg' : '18 mg') },
    { name: '鋅',        val: isMale ? '11 mg' : '8 mg' },
    { name: '鎂',        val: isMale ? (A > 31 ? '420 mg' : '400 mg') : (A > 31 ? '320 mg' : '310 mg') },
    { name: '鉀',        val: isMale ? '3500 mg' : '2600 mg' },
    { name: '磷',        val: '700 mg' },
    { name: '碘',        val: '150 μg' },
    { name: '硒',        val: '55 μg' },
    { name: '銅',        val: '0.9 mg' },
    { name: '鈉（上限）', val: '≤ 2000 mg' },
  ];

  const renderBlock = (arr) => {
    const rows = arr.map(v =>
      `<div class="vit-row"><span class="vit-name">${v.name}</span><span class="vit-val">${v.val}</span></div>`
    ).join('');
    return `<div class="vit-block">${rows}</div>`;
  };

  const half  = Math.ceil(vitamins.length / 2);
  const mhalf = Math.ceil(minerals.length / 2);
  document.getElementById('vit-grid').innerHTML =
    renderBlock(vitamins.slice(0, half)) + renderBlock(vitamins.slice(half));
  document.getElementById('min-grid').innerHTML =
    renderBlock(minerals.slice(0, mhalf)) + renderBlock(minerals.slice(mhalf));

  document.getElementById('results').style.display = 'block';
  document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// 預設加入一條運動列
addExercise();
</script>
</body>
</html>
